services:
  # ── Evolution API (WhatsApp) ──────────────────────────
  evolution:
    image: atendai/evolution-api:v1.8.2
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=VCzyK87Ue8EQq3tCSbdhtXUlTfJuQ_PexZMvsnY5SbQ
      - DATABASE_ENABLED=false
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
    volumes:
      - evolution-data:/evolution/instances
    restart: unless-stopped

  # ── Culto App ─────────────────────────────────────────
  app:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - app-data:/app/backend
    depends_on:
      - evolution
    restart: unless-stopped

volumes:
  postgres-data:
  evolution-data:
  app-data:

